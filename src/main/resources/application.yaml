server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/compliance_hub
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    database-name: compliance_hub

  jpa:
    hibernate:
      ddl-auto: validate  
    show-sql: true       
    properties:
      hibernate:
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration

  profiles:
    active: local
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    vectorstore:
      pgvector:
        table-name: regulation_embeddings
        dimension: 3072         
        initialize-schema: false
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
        chat:
          options:
            model: gemini-2.0-flash
        embedding:
          api-key: ${GOOGLE_API_KEY}
          options:
            model: text-embedding-004
    retry:
      max-attempts: 1
            
logging:
  level:
    org.springframework.security: DEBUG

app:
  jwt:
    secret: 4e7b8f9a2c3d6e5f7a8b9c0d1e2f3a4b
    access-token-expiration-ms: 1800000     
    refresh-token-expiration-ms: 604800000 