server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/compliance_hub
    username: postgres
    password: <PASSWORD>
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate  
    show-sql: true       
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: <SECRET>
    access-token-expiration-ms: 1800000     
    refresh-token-expiration-ms: 604800000 